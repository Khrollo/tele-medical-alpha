name: PR Checks

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - ready_for_review
  workflow_dispatch:

concurrency:
  group: pr-checks-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  typecheck:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    name: TypeScript Typecheck
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npx tsc --noEmit

  build:
    if: github.event_name != 'pull_request' || github.event.pull_request.draft == false
    name: Next.js Build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/postgres
      NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: test-anon-key
      SUPABASE_SERVICE_ROLE_KEY: test-service-role-key
      REPLICATE_API_KEY: test-replicate-key
      OPENROUTER_API_KEY: test-openrouter-key
      STORAGE_BUCKET: telehealth_audio
      NEW_USER_PWD: password
      TWILIO_ACCOUNT_SID: AC00000000000000000000000000000000
      TWILIO_API_KEY: SK00000000000000000000000000000000
      TWILIO_API_SECRET: test-twilio-api-secret
      TWILIO_AUTH_TOKEN: test-twilio-auth-token
      NEXTAUTH_SECRET: test-nextauth-secret
      NEXTAUTH_URL: https://example.vercel.app
      NEXT_PUBLIC_APP_URL: https://example.vercel.app

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run production build
        run: npm run build
